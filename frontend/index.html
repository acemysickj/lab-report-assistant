<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab Assistant — 实验报告助手</title>

    <!-- Inter font for UI, system fonts for content -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- MathJax -->
    <script>
      MathJax = {
        tex: {
          inlineMath: [['\\(', '\\)']],
          displayMath: [['$$', '$$']],
          tags: 'ams',
        },
        startup: {
          typeset: false,
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>

    <style>
      /* ============================================================
         Global styles — Lab Assistant
         ============================================================ */

      /* --- Reset & base --- */
      *, *::before, *::after {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        margin: 0;
        background: #f5f1e8;
      }

      /* --- Custom scrollbar --- */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #d0c8b4;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #b0a890;
      }

      /* --- Smooth page transitions --- */
      @keyframes fadeSlideIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .ant-layout-content > * {
        animation: fadeSlideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* --- Card hover lift --- */
      .ant-card-hoverable {
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                    box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
      }
      .ant-card-hoverable:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(44, 36, 22, 0.1), 0 2px 6px rgba(44, 36, 22, 0.06) !important;
      }

      /* --- Button hover effects --- */
      .ant-btn-primary {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
      }
      .ant-btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(61, 122, 79, 0.35) !important;
      }
      .ant-btn-primary:active {
        transform: translateY(0) !important;
      }

      /* --- Menu item transitions --- */
      .ant-menu-item {
        transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1) !important;
      }

      /* --- Figure placeholder --- */
      .figure-placeholder {
        display: block;
        border: 2px dashed #d0c8b4;
        border-radius: 10px;
        padding: 28px 20px;
        margin: 14px 0;
        text-align: center;
        color: #9b8e78;
        background: #faf8f0;
        font-size: 13px;
        transition: all 0.2s;
      }
      .figure-placeholder:hover {
        border-color: #8db893;
        background: #f5f9f3;
      }

      /* --- Content preview container --- */
      .report-content {
        font-family: "宋体", "SimSun", "Times New Roman", serif;
        font-size: 12pt;
        line-height: 1.6;
        color: #2c2416;
      }
      .report-content h3 { font-size: 15pt; margin: 1.2em 0 0.6em; }
      .report-content p { margin: 0.6em 0; text-indent: 2em; }
      .report-content table {
        border-collapse: collapse;
        margin: 12px auto;
        width: 100%;
      }
      .report-content th, .report-content td {
        padding: 6px 10px;
        font-size: 10.5pt;
        text-align: center;
        border: 1px solid #d0c8b4;
      }

      /* --- Step connector lines --- */
      .ant-steps-item-tail::after {
        background: #ddd4c2 !important;
      }
      .ant-steps-item-finish .ant-steps-item-tail::after {
        background: #8db893 !important;
      }

      /* --- Table row hover --- */
      .ant-table-row {
        transition: background 0.15s !important;
      }

      /* --- Tag pulse for new items --- */
      @keyframes tagPulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(61, 122, 79, 0.3); }
        50% { box-shadow: 0 0 0 4px rgba(61, 122, 79, 0); }
      }
      .tag-new {
        animation: tagPulse 2s ease-in-out infinite;
      }

      /* --- Section card glow on active --- */
      @keyframes borderGlow {
        0%, 100% { border-color: #3d7a4f; }
        50% { border-color: #8db893; }
      }
      .card-active-border {
        animation: borderGlow 3s ease-in-out infinite;
      }

      /* --- Loading shimmer --- */
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .shimmer-bg {
        background: linear-gradient(90deg, #f0ebe0 25%, #e8e0d0 50%, #f0ebe0 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
      }

      /* --- Gradient text for special headings --- */
      .gradient-heading {
        background: linear-gradient(135deg, #3d7a4f 0%, #5b9a6b 50%, #2c5a38 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* --- Soft focus ring --- */
      *:focus-visible {
        outline: 2px solid rgba(61, 122, 79, 0.4);
        outline-offset: 2px;
        border-radius: 4px;
      }

      /* --- Selection color --- */
      ::selection {
        background: rgba(61, 122, 79, 0.15);
        color: #2c2416;
      }

      /* --- Collapse panel transitions --- */
      .ant-collapse-item {
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1) !important;
      }
      .ant-collapse-item-active {
        box-shadow: 0 2px 8px rgba(44, 36, 22, 0.06);
      }

      /* --- Input focus glow --- */
      .ant-input:focus, .ant-input-affix-wrapper-focused {
        box-shadow: 0 0 0 2px rgba(61, 122, 79, 0.12) !important;
      }

      /* --- Select dropdown option --- */
      .ant-select-item-option-selected:not(.ant-select-item-option-disabled) {
        background: #eef5ef !important;
        color: #2c2416 !important;
        font-weight: 500 !important;
      }

      /* --- Modal backdrop --- */
      .ant-modal-mask {
        backdrop-filter: blur(2px);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
