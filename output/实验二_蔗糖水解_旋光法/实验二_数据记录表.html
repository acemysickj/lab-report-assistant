<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>实验二 数据记录表</title>
<style>
  body { font-family: "SimSun","宋体",serif; font-size: 14px; max-width: 900px; margin: 30px auto; padding: 20px; }
  h2 { font-size: 16px; margin: 24px 0 8px; }
  p.note { font-size: 12px; color: #888; margin: 2px 0; }

  /* 三线表 */
  table.data { width: 100%; border-collapse: collapse; margin: 8px 0 16px; table-layout: fixed; }
  table.data thead { border-top: 1.5px solid #000; border-bottom: 0.75px solid #000; }
  table.data tbody { border-bottom: 1.5px solid #000; }
  table.data th { padding: 6px 4px; font-size: 12px; text-align: center; background: #f8f8f8; }
  table.data td { padding: 4px; text-align: center; }
  table.data input { width: 60px; padding: 3px 4px; border: 1px solid #ccc; border-radius: 2px; text-align: center; font-size: 13px; }
  table.data input:focus { border-color: #1976d2; outline: none; box-shadow: 0 0 0 1px #1976d2; }
  table.data input.filled { background: #e8f5e9; border-color: #4caf50; }

  .env-row { display: flex; gap: 40px; margin: 8px 0; }
  .env-row label { font-weight: bold; }
  .env-row input { width: 120px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 2px; }

  .ao-infinity { display: flex; gap: 12px; align-items: center; margin: 8px 0; }
  .ao-infinity input { width: 70px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 2px; text-align: center; }

  button { margin-top: 16px; padding: 8px 24px; font-size: 14px; cursor: pointer; background: #1976d2; color: #fff; border: none; border-radius: 4px; }
  button:hover { background: #1565c0; }

  .hint { background: #fff3e0; border-left: 3px solid #ff9800; padding: 8px 12px; margin: 12px 0; font-size: 13px; }
</style>
</head>
<body>

<h2>实验二 &nbsp; 旋光法测定蔗糖转化反应的速率常数 —— 数据记录</h2>

<div class="hint">📋 请将实验测得的数据填入下表。填完后告知我，我将自动进行数据处理。（不填的格子留空即可）</div>

<h3>环境条件</h3>
<div class="env-row">
  <span><label>实验室温度：</label><input type="text" id="temp" placeholder="℃"> ℃</span>
  <span><label>大气压：</label><input type="text" id="pressure" placeholder="kPa"> kPa</span>
</div>

<h3>表1 &nbsp; 旋光度 α<sub>t</sub> 随时间变化记录（每 2 min 读数一次）</h3>
<table class="data" id="table1">
  <thead>
    <tr><th>t / min</th><th>2</th><th>4</th><th>6</th><th>8</th><th>10</th><th>12</th><th>14</th><th>16</th><th>18</th><th>20</th><th>22</th><th>24</th><th>26</th><th>28</th><th>30</th></tr>
  </thead>
  <tbody>
    <tr><td><b>α<sub>t</sub> / °</b></td>
      <td><input type="text" class="at"></td><td><input type="text" class="at"></td><td><input type="text" class="at"></td><td><input type="text" class="at"></td>
      <td><input type="text" class="at"></td><td><input type="text" class="at"></td><td><input type="text" class="at"></td><td><input type="text" class="at"></td>
      <td><input type="text" class="at"></td><td><input type="text" class="at"></td><td><input type="text" class="at"></td><td><input type="text" class="at"></td>
      <td><input type="text" class="at"></td><td><input type="text" class="at"></td><td><input type="text" class="at"></td>
    </tr>
  </tbody>
</table>
<p class="note">注意：α<sub>t</sub> 为正值时使用"+复测"模式，变为负值后使用"−复测"模式。</p>

<h3>表2 &nbsp; α<sub>∞</sub> 测定（反应完全后，重复测量 5 次取平均）</h3>
<div class="ao-infinity">
  <span><b>α<sub>∞</sub> = </b></span>
  <span>① <input type="text" class="ainf">°</span>
  <span>② <input type="text" class="ainf">°</span>
  <span>③ <input type="text" class="ainf">°</span>
  <span>④ <input type="text" class="ainf">°</span>
  <span>⑤ <input type="text" class="ainf">°</span>
  <span><b>平均值 = </b><input type="text" id="ainf_avg" style="width:80px; background:#f5f5f5;" readonly>°</span>
</div>

<button onclick="copyData()">✅ 填完了，复制数据到剪贴板（然后粘贴给我）</button>

<script>
// Auto-calc α∞ avg
document.querySelectorAll('.ainf').forEach(inp => {
  inp.addEventListener('input', () => {
    const vals = [...document.querySelectorAll('.ainf')].map(i => parseFloat(i.value)).filter(v => !isNaN(v));
    document.getElementById('ainf_avg').value = vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(2) : '';
  });
});
// Mark filled cells green
document.querySelectorAll('input').forEach(inp => {
  inp.addEventListener('input', () => { inp.classList.toggle('filled', inp.value.trim() !== ''); });
});

function copyData() {
  const temp = document.getElementById('temp').value || '未填';
  const pres = document.getElementById('pressure').value || '未填';
  const ats = [...document.querySelectorAll('.at')].map(i => i.value || '').join('\t');
  const ainfs = [...document.querySelectorAll('.ainf')].map(i => i.value || '').join('\t');
  const avg = document.getElementById('ainf_avg').value || '未填';
  const text = `温度: ${temp}℃\n气压: ${pres}kPa\nαt (2~30min): ${ats}\nα∞ 5次: ${ainfs}\nα∞平均: ${avg}°`;
  navigator.clipboard.writeText(text).then(() => alert('已复制！请粘贴到对话中发给我。'));
}
</script>
</body>
</html>
